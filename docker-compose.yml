version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Enterprise Knowledge Brain — Docker Compose
# RAM budget (8 GB machine):
#   app       = max 1 GB  (embeddings + ChromaDB client)
#   ollama    = max 6 GB  (Llama 3.1 8B Q4 ≈ 5.5 GB)
#   reserved  = 0.5 GB    (OS headroom)
# ─────────────────────────────────────────────────────────────────

services:

  # ── Ollama (local LLM server) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ekb_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persist downloaded models
    deploy:
      resources:
        limits:
          memory: 6g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── App (FastAPI + Streamlit) ────────────────────────────────────
  app:
    build: .
    container_name: ekb_app
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    volumes:
      - ./database:/app/database   # persist SQLite + ChromaDB
      - ./documents:/app/documents
      - ./logs:/app/logs
    environment:
      - OLLAMA_HOST=http://ollama:11434   # point to Ollama container
    deploy:
      resources:
        limits:
          memory: 1g          # hard cap — OOM killer activates above this
          cpus: "2.0"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  ollama_data: